<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UniPool OG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* OG card. Pure typography composition with a single brand
         move: the wordmark is set with a dotless "ı" (U+0131) so
         we can draw the i-tittle ourselves as a lime location pin.
         Below the wordmark sits the app's signature ride-card
         route motif — outline dot → dashed lime line → filled dot
         — pulled in as the only secondary graphic so the OG
         echoes the visual language the user sees in-app on every
         ride card. */
      html, body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        font-family: 'Nunito Sans', system-ui, -apple-system, sans-serif;
        background: #fffdf4;
        color: #263b33;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        font-feature-settings: 'ss01', 'cv01';
      }
      .card {
        position: relative;
        width: 1200px;
        height: 630px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        background: #fffdf4;
      }
      .wordmark-wrap {
        position: relative;
        line-height: 1;
      }
      .wordmark {
        font-weight: 800;
        font-size: 256px;
        letter-spacing: -0.06em;
        line-height: 1;
        color: #263b33;
        margin: 0;
        white-space: nowrap;
      }
      /* Hand-placed dot for the "ı". Sized + positioned to feel
         like the natural tittle, just in lime — a subtle accent
         that turns the wordmark into a single graphic. */
      .i-dot {
        position: absolute;
        top: 22px;
        left: 332px;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: #b5d750;
      }
      /* Route motif. Outline dot + dashed line + filled dot,
         same dimensions/proportions the app's RideCard uses for
         "FROM → TO". Centered horizontally so it sits as a quiet
         baseline under the wordmark. */
      .route {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .route .dot-open {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 3.5px solid #263b33;
        background: transparent;
      }
      .route .dash {
        width: 320px;
        height: 3px;
        background-image: linear-gradient(to right, #b5d750 50%, transparent 50%);
        background-size: 12px 3px;
        background-repeat: repeat-x;
      }
      .route .dot-filled {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #263b33;
      }
      .watermark {
        position: absolute;
        bottom: 56px;
        left: 50%;
        transform: translateX(-50%);
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.08em;
        color: #263b33;
        opacity: 0.35;
        text-transform: lowercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="wordmark-wrap">
        <h1 class="wordmark">Unı&#8203;Pool</h1>
        <span class="i-dot" aria-hidden="true"></span>
      </div>
      <div class="route" aria-hidden="true">
        <span class="dot-open"></span>
        <span class="dash"></span>
        <span class="dot-filled"></span>
      </div>
      <p class="watermark">unipool.acmvit.in</p>
    </div>
  </body>
</html>
